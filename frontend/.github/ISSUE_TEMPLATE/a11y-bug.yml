name: Accessibility Bug
description: Report an a11y violation found by axe-core or manual testing
labels: ['a11y', 'bug']
body:
  - type: input
    id: route
    attributes:
      label: Route / Page
      description: Which page has the issue?
      placeholder: "/kit/forms"
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Axe rule ID
      description: "The axe-core rule that failed (e.g. color-contrast, label)"
      placeholder: "color-contrast"
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - serious
        - moderate
        - minor
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's the violation and where?
      placeholder: "Button has insufficient color contrast ratio 3.2:1 (needs 4.5:1)"
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If possible, attach a screenshot
    validations:
      required: false
