name: A11y Nightly Audit

on:
  schedule:
    - cron: '3 4 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  axe-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start static server
        run: pnpm dlx serve dist/kppdf-frontend/browser -l 4200 &
      - name: Wait for server
        run: sleep 5
      - name: Run axe audit
        id: audit
        run: |
          pnpm run audit:a11y 2>&1 | tee audit-output.txt || true
          echo "has_blocking=false" >> "$GITHUB_OUTPUT"
          if grep -q "goal NOT met" audit-output.txt 2>/dev/null; then
            echo "has_blocking=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-audit-${{ github.run_id }}
          path: frontend/audit-output.txt
          retention-days: 30
      - name: Create issue on blocking violations
        if: steps.audit.outputs.has_blocking == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('frontend/audit-output.txt', 'utf8');
            const body = [
              '## A11y Audit — Blocking Violations Detected',
              '',
              `**Date**: ${new Date().toISOString().slice(0, 10)}`,
              `**Run**: [#${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### Audit Output',
              '```',
              output.slice(-6000),
              '```',
              '',
              '_Automated by a11y-nightly workflow. Fix critical/serious violations to clear._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `A11y audit: ${new Date().toISOString().slice(0, 10)} blocking violations`,
              body,
              labels: ['a11y', 'automated'],
            });
