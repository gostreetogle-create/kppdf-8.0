name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend jobs ──────────────────────────────────────────────────

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run lint
        working-directory: frontend
      - run: pnpm run format:check
        working-directory: frontend

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run test -- --watch=false
        working-directory: frontend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run build
        working-directory: frontend

  # ── Backend jobs ───────────────────────────────────────────────────

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: pnpm run lint
        working-directory: backend
      - run: pnpm run format
        working-directory: backend
        if: always()

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: pnpm run test
        working-directory: backend

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: pnpm run build
        working-directory: backend
      - run: pnpm run typecheck
        working-directory: backend

  # ── Summary gate ───────────────────────────────────────────────────

  ci-passed:
    name: CI Passed
    if: always()
    needs:
      - frontend-lint
      - frontend-test
      - frontend-build
      - backend-lint
      - backend-test
      - backend-build
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          result="${{ needs.frontend-lint.result }}"
          for r in \
            "${{ needs.frontend-test.result }}" \
            "${{ needs.frontend-build.result }}" \
            "${{ needs.backend-lint.result }}" \
            "${{ needs.backend-test.result }}" \
            "${{ needs.backend-build.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              result="failure"
            fi
          done
          if [ "$result" != "success" ]; then
            echo "::error::One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
