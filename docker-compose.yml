version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: kppdf-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo-data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    # NOTE: two different hostnames are intentional.
    # - `mongosh --host mongo:27017` lets the init container reach the mongo service via Docker DNS.
    # - `host: "127.0.0.1:27017"` is the member hostname stored in rs.conf() and read by clients.
    #
    # Works for: HOST backend (docker port forward 27017→27017 makes host's 127.0.0.1:27017 reach mongo).
    # Does NOT work for: sibling containers (their own 127.0.0.1 = themselves, not mongo).
    # If you dockerize the backend later, switch the stored member hostname to `kppdf-mongo:27017`
    # (container_name) and accept that host-based dev tools won't reach the same hostname.
    entrypoint: >-
      sh -c "mongosh --host mongo:27017 --eval
      'try { rs.status() } catch (e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"127.0.0.1:27017\"}]}) }'"

  backend:
    build: ./backend
    container_name: kppdf-backend
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    env_file: .env
    ports: ["3000:3000"]
    volumes:
      - ./backend/src:/app/src

volumes:
  mongo-data:
